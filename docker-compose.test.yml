version: '3.8'

services:
  # Test Database
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: nexo_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d nexo_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Test Redis
  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_test_data:/data

  # Backend Test Runner
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    environment:
      NODE_ENV: test
      DB_HOST: postgres-test
      DB_PORT: 5432
      DB_USERNAME: test
      DB_PASSWORD: test
      DB_DATABASE: nexo_test
      REDIS_URL: redis://redis-test:6379
      JWT_SECRET: test-jwt-secret
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run test:all

  # ML Test Runner
  ml-test:
    build:
      context: ./ml
      dockerfile: Dockerfile.test
    environment:
      PYTHONPATH: /app
    volumes:
      - ./ml:/app
    command: pytest tests/ -v --cov=. --cov-report=xml

  # Frontend Test Runner
  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    environment:
      CI: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run test:ci

volumes:
  postgres_test_data:
  redis_test_data:
