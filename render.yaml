services:
  - type: web
    name: mechmind-backend
    runtime: node
    region: frankfurt
    plan: starter
    numInstances: 1
    branch: main
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /liveness
    envVars:
      # App config
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://mechmind-os.vercel.app
      - key: CORS_ORIGIN
        value: https://mechmind-os.vercel.app
      # Secrets (configured in Render dashboard)
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # Redis — uses Render internal service (internal = no TLS, no auth, private network)
      - key: REDIS_URL
        fromService:
          name: nexo-redis
          type: redis
          property: internalConnectionString

  - type: web
    name: nexo-frontend
    runtime: node
    region: frankfurt
    plan: starter
    numInstances: 1
    branch: main
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build && cp -r public .next/standalone/public && cp -r .next/static .next/standalone/.next/static
    startCommand: node .next/standalone/server.js
    healthCheckPath: /
    envVars:
      # App config
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Core URLs
      - key: NEXT_PUBLIC_APP_URL
        value: https://nexo-frontend.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://nexo-gestionale.onrender.com
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://nexo-gestionale.onrender.com
      - key: BACKEND_URL
        value: https://nexo-gestionale.onrender.com/v1
      # Auth secrets (shared with backend — configure in Render dashboard)
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_SECRET
        sync: false
      - key: PORTAL_JWT_SECRET
        sync: false
      # Database (for Prisma direct access in API routes)
      - key: DATABASE_URL
        sync: false
      # Stripe (configure in Render dashboard if billing enabled)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false

  - type: redis
    name: nexo-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    region: frankfurt
    ipAllowList: []
