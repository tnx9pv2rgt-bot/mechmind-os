services:
  - type: web
    name: nexo-backend
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://mechmind-os.vercel.app
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
