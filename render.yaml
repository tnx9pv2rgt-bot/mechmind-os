services:
  - type: web
    name: mechmind-backend
    runtime: node
    region: frankfurt
    plan: starter
    numInstances: 1
    branch: main
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npx prisma migrate deploy && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /readiness
    envVars:
      # App config
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://mechmind-os.vercel.app
      - key: CORS_ORIGIN
        value: https://mechmind-os.vercel.app
      # Secrets (configured in Render dashboard)
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: APP_URL
        sync: false
      - key: SES_FROM_EMAIL
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: EMAIL_FROM_NAME
        sync: false
      # Redis — uses Render internal service (internal = no TLS, no auth, private network)
      - key: REDIS_URL
        fromService:
          name: nexo-redis
          type: redis
          property: connectionString

  - type: web
    name: nexo-frontend
    runtime: node
    region: frankfurt
    plan: starter
    numInstances: 1
    branch: main
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build && cp -r public .next/standalone/public && cp -r .next/static .next/standalone/.next/static
    startCommand: node .next/standalone/server.js
    healthCheckPath: /
    envVars:
      # App config
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Core URLs
      - key: NEXT_PUBLIC_APP_URL
        value: https://nexo-frontend.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://nexo-gestionale.onrender.com
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://nexo-gestionale.onrender.com
      - key: BACKEND_URL
        value: https://nexo-gestionale.onrender.com/v1
      # Auth secrets (shared with backend — configure in Render dashboard)
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_SECRET
        sync: false
      - key: PORTAL_JWT_SECRET
        sync: false
      # DATABASE_URL removed — frontend no longer accesses the database directly
      # Stripe (configure in Render dashboard if billing enabled)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      # Sentry (configure DSN in Render dashboard)
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false

  - type: redis
    name: nexo-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    region: frankfurt
    ipAllowList: []

  # ========== STAGING (Beta: 3-5 officine) ==========
  # NOTE: Auto-deploy is DISABLED for safety. Deploy only via manual trigger in Render dashboard.
  - type: web
    name: nexo-backend-staging
    runtime: node
    region: frankfurt
    plan: starter
    numInstances: 1
    branch: staging
    rootDir: backend
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && node dist/main
    # Health check path: /readiness (includes DB + Redis checks)
    # HTTP 200 = ready, 503 = not ready (will not route traffic during deployment)
    healthCheckPath: /readiness
    healthCheckTimeout: 30
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: 3002
      - key: FRONTEND_URL
        value: https://nexo-frontend-staging.onrender.com
      - key: CORS_ORIGIN
        value: https://nexo-frontend-staging.onrender.com
      # Database (Render PostgreSQL managed service)
      - key: DATABASE_URL
        fromService:
          name: nexo-db-staging
          type: pgsql
          property: connectionString
      # Redis (Render Redis managed service)
      - key: REDIS_URL
        fromService:
          name: nexo-redis-staging
          type: redis
          property: connectionString
      # Secrets (sync: false = manual configuration in Render dashboard only)
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SETUP_SECRET
        sync: false

  - type: web
    name: nexo-frontend-staging
    runtime: node
    region: frankfurt
    plan: starter
    numInstances: 1
    branch: staging
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build && cp -r public .next/standalone/public && cp -r .next/static .next/standalone/.next/static
    startCommand: node .next/standalone/server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_APP_URL
        value: https://nexo-frontend-staging.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://nexo-backend-staging.onrender.com
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://nexo-backend-staging.onrender.com
      - key: BACKEND_URL
        value: https://nexo-backend-staging.onrender.com/v1
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_SECRET
        sync: false

  # ========== STAGING DATABASE & CACHE ==========
  - type: pgsql
    name: nexo-db-staging
    plan: free
    region: frankfurt
    # Free tier: 256MB, 1 backup, 90-day retention
    # Sufficient for beta testing (3-5 officine, <1M rows)
    ipAllowList: []
    postgresMajorVersion: 15

  - type: redis
    name: nexo-redis-staging
    plan: free
    region: frankfurt
    # Free tier: 30MB max memory, TTL-based eviction
    # Sufficient for session/cache (BullMQ queues, locks)
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
