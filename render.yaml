services:
  - type: web
    name: mechmind-backend
    runtime: node
    region: frankfurt
    plan: starter
    numInstances: 1
    branch: main
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npx --yes prisma@5.22.0 generate && npx --yes prisma@5.22.0 migrate deploy && npm run build
    startCommand: npm run start:prod
    preDeployCommand: npx prisma migrate deploy
    healthCheckPath: /health
    envVars:
      # App config
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://mechmind-os.vercel.app
      - key: CORS_ORIGIN
        value: https://mechmind-os.vercel.app
      # Secrets (configured in Render dashboard)
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # Redis
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_TLS
        value: "true"
