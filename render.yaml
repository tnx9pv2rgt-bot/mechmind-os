services:
  - type: web
    name: mechmind-backend
    runtime: node
    region: frankfurt
    plan: starter
    numInstances: 1
    branch: main
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      # App config
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://mechmind-os.vercel.app
      - key: CORS_ORIGIN
        value: https://mechmind-os.vercel.app
      # Secrets (configured in Render dashboard)
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # Redis — uses Render internal service
      - key: REDIS_URL
        fromService:
          name: nexo-redis
          type: redis
          property: connectionString

  - type: redis
    name: nexo-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    region: frankfurt
