version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mechmind-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mechmind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mechmind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru

  # Backend NestJS
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    container_name: mechmind-backend
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-mechmind}?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    networks:
      - backend-net
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.5'
    command: npm run start:dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    container_name: mechmind-frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3001
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    command: npm run dev
    depends_on:
      - backend

  # Adminer (Database GUI) — only with: docker compose --profile dev-tools up
  adminer:
    image: adminer:latest
    container_name: mechmind-adminer
    ports:
      - "8080:8080"
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    depends_on:
      - postgres
    profiles:
      - dev-tools

  # Redis Commander (Redis GUI) — only with: docker compose --profile dev-tools up
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: mechmind-redis-ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    depends_on:
      - redis
    profiles:
      - dev-tools

  # Ngrok (Espone app su internet)
  ngrok:
    image: ngrok/ngrok:latest
    container_name: mechmind-ngrok
    command: http frontend:3000 --domain=${NGROK_DOMAIN:-} --log=stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    networks:
      - frontend-net
    depends_on:
      - frontend
    profiles:
      - share  # Solo quando vuoi condividere

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
