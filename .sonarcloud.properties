# SonarCloud Configuration for Nexo MechMind OS
# https://sonarcloud.io

# Project identification
sonar.projectKey=nexo-mechmind-os
sonar.organization=nexo-automotive
sonar.projectName=Nexo MechMind OS
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=backend/src,frontend,lib,mechmind-os,ml
sonar.tests=backend/tests,frontend/tests,tests

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.next/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.config.ts,\
  **/*.config.js,\
  **/migrations/**,\
  **/generated/**

# Test file patterns
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Language-specific settings
sonar.typescript.tsconfigPaths=tsconfig.json,backend/tsconfig.json,frontend/tsconfig.json
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx

# Python settings (for ML)
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# Code coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Duplication
sonar.cpd.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/migrations/**

# Quality Gate settings
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Security
sonar.security.hotspots.level=high

# Analysis settings
sonar.sourceEncoding=UTF-8
sonar.verbose=false

# Technical debt
sonar.technicalDebt.calculation.method=SQALE
sonar.technicalDebt.rating.grid=0.05,0.1,0.2,0.5

# Rule configurations
# Disable rules that conflict with project conventions
sonar.issue.ignore.multicriteria=e1,e2,e3

# E1: Allow console.log in backend
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=backend/**

# E2: Allow 'any' type in test files
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S4204
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.test.ts

# E3: Allow TODO comments (we track them)
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S1135
sonar.issue.ignore.multicriteria.e3.resourceKey=**
