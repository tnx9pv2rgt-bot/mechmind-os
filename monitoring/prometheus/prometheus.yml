global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alert-rules.yml

scrape_configs:
  - job_name: 'mechmind-backend'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:3002']
        labels:
          service: mechmind-backend
          environment: development

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
