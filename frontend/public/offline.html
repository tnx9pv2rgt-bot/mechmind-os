<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - MechMind OS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 480px;
      text-align: center;
      background: white;
      padding: 48px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #e0e7ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon svg {
      width: 40px;
      height: 40px;
      color: #4f46e5;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 12px;
    }
    
    p {
      font-size: 16px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    button {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .btn-primary {
      background: #4f46e5;
      color: white;
    }
    
    .btn-primary:hover {
      background: #4338ca;
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }
    
    .btn-secondary:hover {
      background: #e5e7eb;
    }
    
    .status {
      margin-top: 24px;
      padding: 12px;
      background: #fef3c7;
      border-radius: 8px;
      font-size: 14px;
      color: #92400e;
    }
    
    .status.online {
      background: #d1fae5;
      color: #065f46;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      }
      
      .container {
        background: #1f2937;
      }
      
      h1 {
        color: #f9fafb;
      }
      
      p {
        color: #9ca3af;
      }
      
      .btn-secondary {
        background: #374151;
        color: #f9fafb;
      }
      
      .btn-secondary:hover {
        background: #4b5563;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
      </svg>
    </div>
    
    <h1>Sei offline</h1>
    <p>
      Non riusciamo a connetterci a internet. 
      Controlla la tua connessione e riprova.
    </p>
    
    <div class="actions">
      <button class="btn-primary" onclick="window.location.reload()">
        🔄 Riprova
      </button>
      <button class="btn-secondary" onclick="goHome()">
        🏠 Torna alla Home
      </button>
    </div>
    
    <div id="status" class="status" style="display: none;">
      Connessione ripristinata! Reindirizzamento...
    </div>
  </div>
  
  <script>
    // Check online status
    function updateOnlineStatus() {
      const statusDiv = document.getElementById('status');
      
      if (navigator.onLine) {
        statusDiv.textContent = 'Connessione ripristinata! Reindirizzamento...';
        statusDiv.className = 'status online';
        statusDiv.style.display = 'block';
        
        // Redirect to home after 2 seconds
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
      }
    }
    
    // Listen for online event
    window.addEventListener('online', updateOnlineStatus);
    
    // Go to home function
    function goHome() {
      window.location.href = '/';
    }
    
    // Check immediately
    if (navigator.onLine) {
      updateOnlineStatus();
    }
  </script>
</body>
</html>
