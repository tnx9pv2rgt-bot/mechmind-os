rules:

  # ── A03:2021 Injection ────────────────────────────────────────────────────────

  - id: template-literal-with-user-input
    patterns:
      - pattern: |
          `$PREFIX${$REQ.body.$FIELD}$SUFFIX`
      - pattern-not-inside: |
          // semgrep: ignore
    message: >
      Template literal con input utente non sanitizzato (req.body.$FIELD).
      Rischio: template injection, log injection, SQL injection se usato in query.
      Fix: validare e sanitizzare l'input prima di inserirlo in template string.
    languages: [typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: 'CWE-94: Improper Control of Generation of Code'
      owasp: 'A03:2021 - Injection'
    paths:
      include:
        - 'backend/src/**'
      exclude:
        - '**/*.spec.ts'

  - id: raw-sql-string-interpolation
    patterns:
      - pattern: this.prisma.$queryRaw(`$...PARTS`)
      - pattern-not: this.prisma.$queryRaw(Prisma.sql`$...PARTS`)
    message: >
      $queryRaw con template literal non sicuro. Usare Prisma.sql`` per sanitizzare automaticamente i parametri.
      Rischio: SQL injection.
    languages: [typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: 'CWE-89: SQL Injection'
      owasp: 'A03:2021 - Injection'
    paths:
      include:
        - 'backend/src/**'
      exclude:
        - '**/*.spec.ts'

  # ── A07:2021 Authentication Failures ─────────────────────────────────────────

  - id: hardcoded-bearer-token
    patterns:
      - pattern-regex: 'Bearer\s+[A-Za-z0-9\-_\.]{20,}'
      - pattern-not-regex: 'Bearer\s+\$\{'
      - pattern-not-regex: 'Bearer.*test|Bearer.*example|Bearer.*placeholder'
    message: >
      Token Bearer hardcoded rilevato. Non committare mai token reali nel codice.
      Fix: usare variabile d'ambiente (process.env.API_TOKEN) o ConfigService.
    languages: [typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: 'CWE-798: Use of Hard-coded Credentials'
      owasp: 'A07:2021 - Identification and Authentication Failures'
    paths:
      include:
        - 'backend/src/**'
      exclude:
        - '**/*.spec.ts'
        - '**/*.test.ts'

  - id: jwt-sign-without-expiry
    patterns:
      - pattern: jwt.sign($PAYLOAD, $SECRET)
      - pattern-not: jwt.sign($PAYLOAD, $SECRET, { ..., expiresIn: $_, ... })
      - pattern-not: jwt.sign($PAYLOAD, $SECRET, { expiresIn: $_, ... })
    message: >
      jwt.sign() senza expiresIn. Token senza scadenza non possono essere revocati.
      Fix: aggiungere sempre `expiresIn` (es. '15m', '1h', '7d').
    languages: [typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: 'CWE-613: Insufficient Session Expiration'
      owasp: 'A07:2021 - Identification and Authentication Failures'
    paths:
      include:
        - 'backend/src/**'
      exclude:
        - '**/*.spec.ts'

  # ── A09:2021 Security Logging Failures ───────────────────────────────────────

  - id: console-log-request-body
    patterns:
      - pattern: console.log($REQ.body)
    message: >
      console.log(req.body) logga dati utente non filtrati (possibile PII, password).
      Fix: usare LoggerService con campi selettivi. Mai loggare body interi.
    languages: [typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: 'CWE-532: Insertion of Sensitive Information into Log File'
      owasp: 'A09:2021 - Security Logging and Monitoring Failures'
    paths:
      include:
        - 'backend/src/**'
      exclude:
        - '**/*.spec.ts'

  - id: json-stringify-user-object-in-log
    patterns:
      - pattern: console.log(JSON.stringify($USER))
      - metavariable-regex:
          metavariable: $USER
          regex: '.*(user|User|payload|Payload|customer|Customer).*'
    message: >
      JSON.stringify di oggetto utente/payload in log. Rischio esposizione PII (email, nome, telefono).
      Fix: loggare solo campi non sensibili (es. `{ userId: user.id, action: ... }`).
    languages: [typescript]
    severity: WARNING
    metadata:
      category: security
      cwe: 'CWE-532: Insertion of Sensitive Information into Log File'
      owasp: 'A09:2021 - Security Logging and Monitoring Failures'
    paths:
      include:
        - 'backend/src/**'
      exclude:
        - '**/*.spec.ts'

  - id: logger-error-with-full-error-object
    patterns:
      - pattern: this.logger.error($MSG, $ERR)
      - pattern-not: this.logger.error($MSG, $ERR.message)
      - pattern-not: this.logger.error($MSG, $ERR.stack)
    message: >
      Logger.error con oggetto Error completo — può esporre stack trace con path interni in produzione.
      Fix: loggare `error.message` e `error.stack` separatamente, mai l'oggetto intero.
    languages: [typescript]
    severity: WARNING
    metadata:
      category: security
      cwe: 'CWE-209: Generation of Error Message Containing Sensitive Information'
      owasp: 'A09:2021 - Security Logging and Monitoring Failures'
    paths:
      include:
        - 'backend/src/**'
      exclude:
        - '**/*.spec.ts'

  # ── A10:2021 Server-Side Request Forgery (SSRF) ───────────────────────────────

  - id: fetch-with-user-controlled-url
    patterns:
      - pattern: fetch($REQ.body.$URL, ...)
    message: >
      fetch() con URL da req.body — possibile SSRF. Un attaccante può raggiungere
      risorse interne (metadata AWS, 169.254.x.x, redis://localhost, ecc.).
      Fix: validare l'URL contro una allowlist di domini/IP prima di chiamarlo.
    languages: [typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: 'CWE-918: Server-Side Request Forgery'
      owasp: 'A10:2021 - Server-Side Request Forgery'
    paths:
      include:
        - 'backend/src/**'
      exclude:
        - '**/*.spec.ts'

  - id: axios-get-with-user-controlled-url
    patterns:
      - pattern: axios.get($REQ.body.$URL, ...)
    message: >
      axios.get() con URL da req.body — possibile SSRF.
      Fix: validare l'URL contro allowlist prima di eseguire la richiesta.
    languages: [typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: 'CWE-918: Server-Side Request Forgery'
      owasp: 'A10:2021 - Server-Side Request Forgery'
    paths:
      include:
        - 'backend/src/**'
      exclude:
        - '**/*.spec.ts'

  # ── A02:2021 Cryptographic Failures ──────────────────────────────────────────

  - id: md5-usage
    patterns:
      - pattern: crypto.createHash('md5')
    message: >
      MD5 è crittograficamente rotto — non usarlo per hash di sicurezza.
      Fix: usare SHA-256 (`crypto.createHash('sha256')`) o HMAC-SHA256.
    languages: [typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: 'CWE-327: Use of a Broken or Risky Cryptographic Algorithm'
      owasp: 'A02:2021 - Cryptographic Failures'
    paths:
      include:
        - 'backend/src/**'
      exclude:
        - '**/*.spec.ts'

  - id: sha1-usage
    patterns:
      - pattern: crypto.createHash('sha1')
    message: >
      SHA-1 è deprecato per uso crittografico. Fix: usare SHA-256 o superiore.
    languages: [typescript]
    severity: WARNING
    metadata:
      category: security
      cwe: 'CWE-327: Use of a Broken or Risky Cryptographic Algorithm'
      owasp: 'A02:2021 - Cryptographic Failures'
    paths:
      include:
        - 'backend/src/**'
      exclude:
        - '**/*.spec.ts'
