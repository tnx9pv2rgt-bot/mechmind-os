name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mechmind
          POSTGRES_PASSWORD: mechmind
          POSTGRES_DB: mechmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mechmind"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://mechmind:mechmind@localhost:5432/mechmind_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Check Prisma schema
        run: npx prisma validate
        working-directory: backend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: backend

      - name: Lint
        run: npm run lint
        working-directory: backend

      - name: Run tests with coverage
        run: npx jest --forceExit --ci --bail --coverage
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

  backend-e2e:
    name: Backend E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mechmind
          POSTGRES_PASSWORD: mechmind
          POSTGRES_DB: mechmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mechmind"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://mechmind:mechmind@localhost:5432/mechmind_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: E2E Tests
        run: npx jest --config test/jest-e2e.json --forceExit --ci --bail
        working-directory: backend

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Run tests
        run: npx jest --passWithNoTests --forceExit --ci --bail
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ─── Security Gates (MANDATORY — blocks merge on failure) ───

  security-gates:
    name: Security Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # ── Job A: Dependency Audit ──
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Backend dependency audit (CRITICAL — blocks merge)
        run: npm audit --audit-level=critical --omit=dev
        working-directory: backend

      - name: Backend dependency audit (HIGH — warning only)
        run: npm audit --audit-level=high --omit=dev || echo "::warning::HIGH vulnerabilities found in transitive dependencies — review audit report"
        working-directory: backend
        continue-on-error: true

      - name: Backend audit report (artifact)
        if: always()
        run: npm audit --json > audit-report.json || true
        working-directory: backend

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-audit-report
          path: backend/audit-report.json

      # ── Job B: SAST Scan ──
      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/nodejs
            p/typescript
            p/jwt
            p/sql-injection
            p/secrets
          generateSarif: true

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

      # ── Job C: License Check ──
      - name: License compatibility check
        run: npx license-checker --failOn "GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0" --start backend/
        continue-on-error: true

  # Deploy to staging: push to 'staging' branch triggers auto-deploy on Render
