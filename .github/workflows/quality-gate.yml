name: Quality Gate

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  backend-quality:
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:cov -- --forceExit --testPathIgnorePatterns="sse.service.spec" 2>&1 | tee coverage-output.txt

      - name: Enforce service coverage threshold (95%)
        run: |
          FAILED=0
          grep -E "\.service\.ts" coverage-output.txt | grep -E "\|" | while IFS='|' read -r file stmts branch funcs lines uncovered; do
            stmt_val=$(echo "$stmts" | tr -d ' ')
            if [ ! -z "$stmt_val" ] && [ "$stmt_val" != "0" ]; then
              if (( $(echo "$stmt_val < 95" | bc -l 2>/dev/null || echo 0) )); then
                echo "::error::$file has $stmt_val% statement coverage (below 95% threshold)"
                FAILED=1
              fi
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "::error::Coverage gate failed: one or more services below 95% threshold"
            exit 1
          fi

  frontend-quality:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx jest --passWithNoTests --forceExit || true

      - name: Security audit (high+critical)
        run: npm audit --audit-level=critical || true

      - name: Build
        run: npm run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend security audit
        run: cd frontend && npm ci && npm audit --audit-level=critical || true

      - name: Backend security audit
        run: cd backend && npm ci && npm audit --audit-level=critical || true

      - name: SAST - Check for dangerous patterns
        run: |
          echo "=== Checking for eval(), dangerouslySetInnerHTML ==="
          FOUND=$(grep -rn "eval(\|dangerouslySetInnerHTML\|innerHTML\s*=" \
            --include="*.tsx" --include="*.ts" \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.next \
            frontend/ backend/src/ 2>/dev/null | grep -v "redis.eval" | wc -l)
          if [ "$FOUND" -gt "0" ]; then
            echo "::warning::Found $FOUND potentially dangerous patterns"
            grep -rn "eval(\|dangerouslySetInnerHTML\|innerHTML\s*=" \
              --include="*.tsx" --include="*.ts" \
              --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.next \
              frontend/ backend/src/ 2>/dev/null | grep -v "redis.eval"
          else
            echo "✅ No dangerous patterns found"
          fi

      - name: Check for hardcoded secrets
        run: |
          FOUND=$(grep -rn "sk-\|pk_live_\|sk_live_" \
            --include="*.tsx" --include="*.ts" \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.next \
            frontend/ backend/src/ 2>/dev/null | wc -l)
          if [ "$FOUND" -gt "0" ]; then
            echo "::error::Found $FOUND potential hardcoded secrets"
            exit 1
          else
            echo "✅ No hardcoded secrets found"
          fi
