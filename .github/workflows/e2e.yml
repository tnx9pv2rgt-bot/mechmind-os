name: E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox]
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mechmind_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: mechmind_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Setup backend
        working-directory: ./backend
        run: |
          npm ci
          npm run db:migrate
          npm run db:seed:test
        env:
          DATABASE_URL: postgresql://mechmind_test:test_password@localhost:5432/mechmind_test_db
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Run Playwright tests
        working-directory: ./frontend
        run: |
          npx playwright test \
            --project=${{ matrix.project }} \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:4000
          DATABASE_URL: postgresql://mechmind_test:test_password@localhost:5432/mechmind_test_db
          TEST_USER_EMAIL: test@mechmind.local
          TEST_USER_PASSWORD: TestPassword123!
          TEST_ADMIN_EMAIL: admin@mechmind.local
          TEST_ADMIN_PASSWORD: AdminPassword123!

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}-${{ matrix.shardIndex }}
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.project }}-${{ matrix.shardIndex }}
          path: frontend/test-results/
          retention-days: 7

  e2e-tests-summary:
    needs: e2e-tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: playwright-report-*

      - name: Merge Playwright reports
        run: |
          npm install -g @playwright/test
          npx playwright merge-reports --reporter html ./artifacts/playwright-report-*

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 30

  e2e-tests-notification:
    needs: [e2e-tests, e2e-tests-summary]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify on failure
        if: needs.e2e-tests.result == 'failure'
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#mechmind-alerts'
          text: '❌ E2E Tests Failed! Check the reports in the artifacts.'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
