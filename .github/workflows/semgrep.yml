name: Semgrep — NASA Security Gate

on:
  push:
    branches: [main]
    paths:
      - 'backend/src/**'
      - 'frontend/app/**'
      - 'frontend/components/**'
      - '.semgrep/**'
  pull_request:
    paths:
      - 'backend/src/**'
      - 'frontend/app/**'
      - 'frontend/components/**'
      - '.semgrep/**'

jobs:
  semgrep:
    name: Semgrep Security Audit
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Custom rules: tenant isolation, security, PII, async, standards ──────
      - name: Run custom MechMind rules
        id: custom
        run: |
          semgrep \
            --config .semgrep/rules/ \
            --severity ERROR \
            --json \
            --output semgrep-custom.json \
            backend/src/ 2>/dev/null || true

          ERRORS=$(jq '.results | length' semgrep-custom.json 2>/dev/null || echo 0)
          echo "count=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "Custom rule violations: $ERRORS"

      # ── Official rulesets: OWASP Top 10, TypeScript ──────────────────────────
      - name: Run official OWASP + TypeScript rulesets
        id: official
        run: |
          semgrep \
            --config p/owasp-top-ten \
            --config p/typescript \
            --severity ERROR \
            --json \
            --output semgrep-official.json \
            backend/src/ 2>/dev/null || true

          ERRORS=$(jq '.results | length' semgrep-official.json 2>/dev/null || echo 0)
          echo "count=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "Official ruleset violations: $ERRORS"

      # ── Build report ─────────────────────────────────────────────────────────
      - name: Build audit report
        id: report
        run: |
          CUSTOM=$(jq '.results | length' semgrep-custom.json 2>/dev/null || echo 0)
          OFFICIAL=$(jq '.results | length' semgrep-official.json 2>/dev/null || echo 0)
          TOTAL=$((CUSTOM + OFFICIAL))

          {
            echo "## Semgrep — NASA Security Gate"
            echo ""
            echo "| Ruleset | Violazioni |"
            echo "|---------|-----------|"
            echo "| Custom MechMind (tenant, PII, async, standards) | $CUSTOM |"
            echo "| OWASP Top 10 + TypeScript | $OFFICIAL |"
            echo "| **Totale** | **$TOTAL** |"
            echo ""

            if [ "$CUSTOM" -gt 0 ]; then
              echo "### Violazioni Custom (BLOCCANTI)"
              echo ""
              echo '```'
              jq -r '.results[] | "[\(.extra.severity)] \(.path):\(.start.line)\n  Rule: \(.check_id)\n  \(.extra.message)\n"' \
                semgrep-custom.json 2>/dev/null | head -100
              echo '```'
              echo ""
            fi

            if [ "$OFFICIAL" -gt 0 ]; then
              echo "### Violazioni OWASP/TypeScript (BLOCCANTI)"
              echo ""
              echo '```'
              jq -r '.results[] | "[\(.extra.severity)] \(.path):\(.start.line)\n  Rule: \(.check_id)\n  \(.extra.message)\n"' \
                semgrep-official.json 2>/dev/null | head -80
              echo '```'
              echo ""
            fi

            if [ "$TOTAL" -eq 0 ]; then
              echo "**GATE PASSATO** — 0 violazioni trovate."
            fi
          } > semgrep-report.md

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      # ── Post PR comment ───────────────────────────────────────────────────────
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('semgrep-report.md')) return;
            const body = fs.readFileSync('semgrep-report.md', 'utf8');
            if (!body.trim()) return;

            // Find existing bot comment and update instead of creating a new one
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Semgrep — NASA Security Gate')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      # ── Fail gate ─────────────────────────────────────────────────────────────
      - name: Fail if violations found
        if: steps.report.outputs.total != '0'
        run: |
          echo "GATE FALLITO: ${{ steps.report.outputs.total }} violazioni trovate."
          echo "Vedi commento PR o output sopra per i dettagli."
          exit 1
